name: QNX Unit Tests - x86-64 QNX 8
on:
  pull_request:
    types: [opened, reopened, synchronize]
jobs:
  qnx-ut-qemu-tests-build-all:
    runs-on: ubuntu-latest
    environment: workflow-approval
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
      - name: Setup QNX License
        env:
          SCORE_QNX_LICENSE: ${{ secrets.SCORE_QNX_LICENSE }}
        run: |
          mkdir -p /opt/score_qnx/license
          echo "${SCORE_QNX_LICENSE}" | base64 --decode > /opt/score_qnx/license/licenses
      - name: Install qemu
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Allow unprivileged user namespaces
        run: |
          sudo sysctl kernel.apparmor_restrict_unprivileged_userns=0
      - name: Build and test
        env:
          SCORE_QNX_USER: ${{ secrets.SCORE_QNX_USER }}
          SCORE_QNX_PASSWORD: ${{ secrets.SCORE_QNX_PASSWORD }}
        run: |
          bazel test --config=qnx-x86_64 //test:main_cpp_qnx
      - name: Cleanup QNX License
        if: always()
        run: |
          rm -rf /opt/score_qnx
          rm -rf "${HOME}/.cache/bazel"
